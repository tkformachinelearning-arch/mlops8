on: [push]
jobs:
run:
 runs-on: ubuntu-latest
 steps:
 - name: Checkout Repository
 uses: actions/checkout@v2
 - name: Setup Python & Install Dependencies
 run: |
 sudo apt update
 sudo apt install -y python3 python3-pip
 ln -sf /usr/bin/python3 /usr/bin/python || true
 pip install --upgrade pip
 pip install -r requirements.txt
 - name: Setup Node.js & Install CML
 run: |
 curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E
bash -
 sudo apt install -y nodejs
 npm install -g @dvcorg/cml
 # CI + CT (already present)
 - name: Train and Evaluate Model
 env:
 repo_token: ${{ secrets.GITHUB_TOKEN }}
 run: |
 python model1.py
 echo "Model Metrics" > report.md
 cat metrics.txt >> report.md
 echo "Model Performance" >> report.md
 echo "Publishing Results..."
 cml-publish model_results.png --md >> report.md
 cml-send-comment report.md
 # NEW: Start Flask API (CD)
 - name: Start Flask API
 run: |
 echo "Starting Flask API..."
 nohup python app.py &
 sleep 5
 # NEW: Test Deployment (API call)
 - name: Test API Endpoint
 run: |
 echo "Testing API..."
 curl -X POST http://127.0.0.1:5000/predict \
 -H "Content-Type: application/json" \
 -d '{"input":[5]}'
